name: Mosaic
options:
  bundleIdPrefix: ai.manaflow.mosaic
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_OBJC_BRIDGING_HEADER: "$(SRCROOT)/Mosaic-Bridging-Header.h"

targets:
  Mosaic:
    type: application
    platform: macOS
    sources:
      - path: MosaicKit
      - path: MosaicUI
    dependencies:
      - framework: ghostty/macos/GhosttyKit.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.manaflow.mosaic
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Mosaic.entitlements
        PRODUCT_NAME: Mosaic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: false
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_ALLOWED: NO
        OTHER_LDFLAGS:
          - "-lc++"
          - "-framework"
          - "Carbon"

  MosaicTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: Mosaic
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.manaflow.mosaic.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Mosaic.app/Contents/MacOS/Mosaic"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  Mosaic:
    build:
      targets:
        Mosaic: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MosaicTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
