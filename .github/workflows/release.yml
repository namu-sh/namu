name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-app:
    name: Build Release
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build Release
        run: |
          xcodebuild -scheme Namu \
            -configuration Release \
            -destination 'platform=macOS' \
            -skipPackagePluginValidation \
            -archivePath build/Namu.xcarchive \
            archive

      - name: Export App
        run: |
          xcodebuild -exportArchive \
            -archivePath build/Namu.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist \
            2>/dev/null || echo "Export requires signing identity — skipped in CI"

      - name: Upload Archive
        uses: actions/upload-artifact@v4
        with:
          name: namu-archive
          path: build/Namu.xcarchive
          retention-days: 30

  build-daemon-and-inject-manifest:
    name: Build Daemon (all platforms) + Inject Manifest
    runs-on: macos-15
    timeout-minutes: 20
    needs: [build-app]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download app archive
        uses: actions/download-artifact@v4
        with:
          name: namu-archive
          path: build

      - name: Build remote daemon (all platforms) and generate manifest
        run: |
          APP_PLIST="build/Namu.xcarchive/Products/Applications/Namu.app/Contents/Info.plist"
          APP_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP_PLIST")
          ./scripts/build_remote_daemon.sh "$APP_VERSION"

      - name: Inject manifest into app Info.plist
        run: |
          APP_PLIST="build/Namu.xcarchive/Products/Applications/Namu.app/Contents/Info.plist"
          MANIFEST_JSON="$(python3 -c 'import json,sys; print(json.dumps(json.load(open(sys.argv[1])), separators=(",",":")))' build/remote-daemon/manifest.json)"
          plutil -remove NamuRemoteDaemonManifestJSON "$APP_PLIST" >/dev/null 2>&1 || true
          plutil -insert NamuRemoteDaemonManifestJSON -string "$MANIFEST_JSON" "$APP_PLIST"

      - name: Upload daemon binaries
        uses: actions/upload-artifact@v4
        with:
          name: namud-remote-binaries
          path: build/remote-daemon/
          if-no-files-found: error

      - name: Upload updated app archive
        uses: actions/upload-artifact@v4
        with:
          name: namu-archive
          path: build/Namu.xcarchive
          overwrite: true
          retention-days: 30

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-app, build-daemon-and-inject-manifest]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/namu-archive/**
            artifacts/namud-remote-binaries/**
          draft: true
