name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-app:
    name: Build Release
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build Release
        run: |
          xcodebuild -scheme Namu \
            -configuration Release \
            -destination 'platform=macOS' \
            -skipPackagePluginValidation \
            -archivePath build/Namu.xcarchive \
            archive

      - name: Export App
        run: |
          xcodebuild -exportArchive \
            -archivePath build/Namu.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist \
            2>/dev/null || echo "Export requires signing identity — skipped in CI"

      - name: Upload Archive
        uses: actions/upload-artifact@v4
        with:
          name: namu-archive
          path: build/Namu.xcarchive
          retention-days: 30

  build-daemon:
    name: Build Daemon (multi-arch)
    runs-on: macos-15
    timeout-minutes: 15
    strategy:
      matrix:
        goos: [darwin]
        goarch: [arm64, amd64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd daemon/remote
          go build -o namud-remote-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/namud-remote/

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: namud-remote-${{ matrix.goos }}-${{ matrix.goarch }}
          path: daemon/remote/namud-remote-${{ matrix.goos }}-${{ matrix.goarch }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-app, build-daemon]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/namud-remote-*/namud-remote-*
          draft: true
